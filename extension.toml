id = "smarty"
name = "Smarty"
version = "0.8.1"
schema_version = 1
authors = ["iwlab <jerome@iwlab.org>"]
description = "Syntax highlighting for the Smarty template language (PrestaShop .tpl)"
repository = "https://github.com/iwlabdev-coder/zed-smarty"

# Forked & extended Smarty grammar (header variables, {assign}/{l} tags,
# string nodes, escaped quotes). Hosted standalone on GitHub: Zed clones it at
# the pinned rev and compiles it at install time — no local grammar folder is
# used. To update: push the new commit, then bump `rev` below to its SHA.
[grammars.smarty]
repository = "https://github.com/iwlabdev-coder/tree-sitter-smarty"
rev = "32f1e0c8750a0638c6621bda6d4e1300f70b680b"

# Always-code PHP variant, injected into Smarty {expressions}
# (the plain "php" grammar needs a <?php tag, so it can't highlight bare fragments)
[grammars.php_only]
repository = "https://github.com/tree-sitter/tree-sitter-php"
rev = "3f2465c217d0a966d41e584b42d75522f2a3149e"
path = "php_only"
