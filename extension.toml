id = "smarty"
name = "Smarty"
version = "0.8.1"
schema_version = 1
authors = ["iwlab <jerome@iwlab.org>"]
description = "Syntax highlighting for the Smarty template language (PrestaShop .tpl)"
repository = "https://github.com/iwlab/zed-smarty"

# Forked & extended Smarty grammar (header variables, {assign}/{l} tags,
# string nodes, escaped quotes).
#
# STANDALONE (recommended): push the tree-sitter-smarty repo to GitHub once,
# then use the https URL below (the rev SHA does NOT change when you push).
# The extension then needs no local grammar folder.
#   repository = "https://github.com/iwlab/tree-sitter-smarty"
#
# LOCAL (no GitHub): keep the file:// line, extract the grammar repo to that
# exact path (keep its .git folder), edit the path if you put it elsewhere.
[grammars.smarty]
repository = "https://github.com/iwlabdev-coder/tree-sitter-smarty"
rev = "32f1e0c8750a0638c6621bda6d4e1300f70b680b"

# Always-code PHP variant, injected into Smarty {expressions}
# (the plain "php" grammar needs a <?php tag, so it can't highlight bare fragments)
[grammars.php_only]
repository = "https://github.com/tree-sitter/tree-sitter-php"
rev = "3f2465c217d0a966d41e584b42d75522f2a3149e"
path = "php_only"
